name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Prevent indefinite hangs on "Getting action download info" (GitHub infra)
    timeout-minutes: 10
    steps:
      - name: release-please
        uses: googleapis/release-please-action@v4.3.0
        timeout-minutes: 8
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
