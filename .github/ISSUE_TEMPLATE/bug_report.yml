name: Bug report
description: Report a problem with the template or a derived project
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
